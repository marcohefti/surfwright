name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: |
          mkdir -p artifacts/validate
          pnpm -s validate | tee artifacts/validate/validate.log

      - name: Capture contract JSON
        run: |
          pnpm -s build
          node dist/cli.js contract > artifacts/validate/contract.json

      - name: Capture policy-check JSON
        run: node scripts/policy-check.mjs --json > artifacts/validate/policy-check.json || true

      - name: Upload validate artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-validate-artifacts
          path: |
            artifacts/validate/validate.log
            artifacts/validate/contract.json
            artifacts/validate/policy-check.json
            dist
            test/fixtures/contract/contract.snapshot.json

  validate-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate strict
        run: |
          mkdir -p artifacts/validate-strict
          pnpm -s validate:strict | tee artifacts/validate-strict/validate-strict.log

      - name: Capture strict policy-check JSON
        run: node scripts/policy-check.mjs --config policy/config.strict.json --json > artifacts/validate-strict/policy-strict.json || true

      - name: Capture contract JSON
        run: |
          pnpm -s build
          node dist/cli.js contract > artifacts/validate-strict/contract.json

      - name: Upload validate:strict artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-validate-strict-artifacts
          path: |
            artifacts/validate-strict/validate-strict.log
            artifacts/validate-strict/policy-strict.json
            artifacts/validate-strict/contract.json
            dist
            test/fixtures/contract/contract.snapshot.json

  validate-node-22:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate on Node 22
        run: |
          mkdir -p artifacts/validate-node-22
          pnpm -s validate | tee artifacts/validate-node-22/validate.log

      - name: Upload Node 22 validate artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-validate-node-22-artifacts
          path: artifacts/validate-node-22/validate.log

  changelog-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Changelog check
        run: |
          mkdir -p artifacts/changelog
          node scripts/changelog-check.mjs | tee artifacts/changelog/changelog-check.log

      - name: Upload changelog-check artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-changelog-check-artifacts
          path: artifacts/changelog/changelog-check.log

  test-lane:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: ${{ matrix.timeoutMinutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: contract
            command: pnpm -s test:contract
            timeoutMinutes: 20
            installChrome: false
          - lane: fixtures
            command: pnpm -s test:fixtures
            timeoutMinutes: 15
            installChrome: false
          - lane: release-scripts
            command: pnpm -s test:release-scripts
            timeoutMinutes: 15
            installChrome: false
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install Chrome
        if: matrix.installChrome == true
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test lane
        run: |
          mkdir -p artifacts/test-lanes
          set -o pipefail
          node scripts/ci/run-with-heartbeat.mjs \
            --label "test:${{ matrix.lane }}" \
            --interval-ms 30000 \
            -- bash -lc "${{ matrix.command }}" \
            | tee "artifacts/test-lanes/${{ matrix.lane }}.log"

      - name: Upload test-lane artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-test-${{ matrix.lane }}-artifacts
          path: artifacts/test-lanes/${{ matrix.lane }}.log

  test-browser-smoke:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install Chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run browser smoke lane
        run: |
          mkdir -p artifacts/test-lanes
          set -o pipefail
          node scripts/ci/run-with-heartbeat.mjs \
            --label "test:browser-smoke" \
            --interval-ms 30000 \
            -- bash -lc "pnpm -s test:browser:smoke" \
            | tee "artifacts/test-lanes/browser-smoke.log"

      - name: Upload browser smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-test-browser-smoke-artifacts
          path: artifacts/test-lanes/browser-smoke.log

  test-browser:
    runs-on: ubuntu-latest
    needs: test-browser-smoke
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install Chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run browser full lane
        run: |
          mkdir -p artifacts/test-lanes
          set -o pipefail
          node scripts/ci/run-with-heartbeat.mjs \
            --label "test:browser" \
            --interval-ms 30000 \
            -- bash -lc "pnpm -s test:browser" \
            | tee "artifacts/test-lanes/browser.log"

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-test-browser-artifacts
          path: artifacts/test-lanes/browser.log

  test:
    runs-on: ubuntu-latest
    needs: [test-lane, test-browser-smoke, test-browser]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Aggregate test lanes
        run: |
          if [ "${{ needs.test-lane.result }}" = "success" ] && [ "${{ needs.test-browser-smoke.result }}" = "success" ] && [ "${{ needs.test-browser.result }}" = "success" ]; then
            echo "all test lanes passed"
            exit 0
          fi
          echo "one or more test lanes failed"
          exit 1

  skill-lifecycle:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run skill lifecycle lane
        run: |
          mkdir -p artifacts/skill-lifecycle
          set -o pipefail
          pnpm -s test:skill-lifecycle | tee artifacts/skill-lifecycle/test.log

      - name: Upload skill lifecycle artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-skill-lifecycle-artifacts
          path: artifacts/skill-lifecycle/test.log

  update-lifecycle:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run update lifecycle lane
        run: |
          mkdir -p artifacts/update-lifecycle
          set -o pipefail
          pnpm -s test:update-lifecycle | tee artifacts/update-lifecycle/test.log

      - name: Upload update lifecycle artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-update-lifecycle-artifacts
          path: artifacts/update-lifecycle/test.log

  release-check:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release check
        run: node scripts/release-check.mjs

      - name: Upload release-check artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-release-check-artifacts
          path: artifacts/release-check

  dual-package-parity-check:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dual package parity check
        run: node scripts/dual-package-parity-check.mjs

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-dual-package-parity-artifacts
          path: artifacts/dual-package-parity
